<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Price List | Clotheline</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0F172A;
            --secondary: #448AFF;
            --text-main: #FFFFFF;
            --text-dim: #94A3B8;
            --bg: #020617;
            --card-bg: #1E293B;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 40px;
        }

        header {
            background-color: var(--primary);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 14px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .category-section {
            margin-bottom: 30px;
        }

        .category-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--secondary);
        }

        .category-name {
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .service-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .service-card:active {
            transform: scale(0.98);
        }

        .service-info {
            flex: 1;
        }

        .service-name {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .service-desc {
            font-size: 12px;
            color: var(--text-dim);
        }

        .service-price {
            font-weight: 700;
            color: var(--secondary);
            font-size: 16px;
            margin-left: 15px;
            white-space: nowrap;
        }

        .disclaimer {
            font-size: 11px;
            color: var(--text-dim);
            text-align: center;
            margin-top: 20px;
            font-style: italic;
            padding: 0 20px;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .powered-by {
            font-size: 12px;
            color: var(--text-dim);
        }

        .loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 200px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-msg {
            text-align: center;
            color: #ef4444;
            padding: 40px 20px;
        }

        .last-updated {
            font-size: 10px;
            color: var(--text-dim);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Service Price List</h1>
        <p class="subtitle" id="branch-name">Loading branch info...</p>
        <p class="subtitle">Scan anytime to view the latest prices for this branch.</p>
    </header>

    <div class="container" id="main-content">
        <div class="loader">
            <div class="spinner"></div>
        </div>
    </div>

    <div class="disclaimer">
        Prices may vary depending on garment condition or special service requirements.
    </div>

    <footer>
        <p class="powered-by">Powered by Clotheline</p>
    </footer>

    <script src="pricelist.js"></script>
</body>
</html>
